name: Tests

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install fastapi uvicorn anthropic python-dotenv pydantic httpx pytest pytest-asyncio pytest-cov
        working-directory: backend
      - name: Run tests
        run: python -m pytest tests/ -v
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run tests
        run: npx vitest run
        working-directory: frontend
